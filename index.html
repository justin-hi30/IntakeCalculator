<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f8fb;
            --card: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --radius: 12px;
            --max-width: 760px;
        }

        * {
            box-sizing: border-box
        }

        body {
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(180deg, var(--bg), #ffffff 60%);
            margin: 0;
            padding: 40px;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: var(--max-width);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px
        }

        h1 {
            font-size: 20px;
            margin: 0;
            font-weight: 700
        }

        p.lead {
            color: var(--muted);
            margin: 8px 0 20px
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .full {
            grid-column: 1/3
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px
        }

        input[type=number],
        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #e6e9ef;
            background: #fbfdff
        }

        .radios {
            display: flex;
            gap: 12px;
            align-items: center
        }

        .radios label {
            margin: 0;
            color: var(--muted);
            font-size: 20x
        }

        button {
            background: var(--accent);
            color: white;
            border: 0;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .result {
            margin-top: 16px;
            padding: 14px;
            border-radius: 10px;
            background: linear-gradient(90deg, #eef2ff, #f8fafc);
            color: #0b1220;
            font-weight: 600
        }

        footer {
            margin-top: 16px;
            color: var(--muted);
            font-size: 13px;
            text-align: center
        }

        @media (max-width:600px) {
            body {
                padding: 18px
            }

            form {
                grid-template-columns: 1fr
            }

            .full {
                grid-column: 1
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <header>
            <div>
                <h1>Protein Calculator</h1>
                <p class="lead">Estimate daily protein needs based on weight and activity.</p>
            </div>
        </header>

        <form id="calculator">
            <div>
                <label for="age">Age</label>
                <input type="number" id="age" min="0" step="1" placeholder="Years">
            </div>

            <div>
                <label>Gender</label>
                <div class="radios">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>
            </div>

            <div>
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" min="0" step="0.1" placeholder="e.g. 70">
            </div>

            <div>
                <label for="height">Height (cm)</label>
                <input type="number" id="height" min="0" step="0.1" placeholder="e.g. 175">
            </div>

            <div class="full">
                <label for="activity">Activity level</label>
                <select id="activity">
                    <option id="sedentary" value="sedentary">Sedentary (little or no exercise)</option>
                    <option id="light" value="light">Lightly active (1-3 days/week)</option>
                    <option id="moderate" value="moderate">Moderately active (3-5 days/week)</option>
                    <option id="active" value="active">Active (6-7 days/week)</option>
                    <option id="veryActive" value="veryActive">Very active (heavy training / physical job)</option>
                </select>
            </div>

            <div class="full"
                style="display:flex;gap:12px;align-items:center;justify-content:flex-start;margin-top:6px">
                <button type="button" id="calculate">Calculate</button>
                <div id="result" class="result" aria-live="polite">Enter values and press Calculate.</div>
            </div>
        </form>

        <footer>Results are estimates. Consult a professional for personalized advice.</footer>
    </div>

    <script>
        const weightInput = document.getElementById('weight');
        const activitySelect = document.getElementById('activity');
        const calculateButton = document.getElementById('calculate');
        const resultBox = document.getElementById('result');

        function computeProtein(weight, activity) {
            switch (activity) {
                case 'sedentary': return weight * 0.8;
                case 'light': return weight * 1.2;
                case 'moderate': return weight * 1.5;
                case 'active': return weight * 2.0;
                case 'veryActive': return weight * 2.2;
                default: return weight * 1.0;
            }
        }

        calculateButton.addEventListener('click', () => {
            const weight = parseFloat(weightInput.value);
            const activity = activitySelect.value;

            if (!weight || weight <= 0 || isNaN(weight)) {
                resultBox.textContent = 'Please enter a valid weight in kilograms.';
                return;
            }

            const proteinNeeds = computeProtein(weight, activity);
            resultBox.textContent = `Your estimated daily protein need: ${proteinNeeds.toFixed(1)} g`;
        });
    </script>
</body>

</html>
