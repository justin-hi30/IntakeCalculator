<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calories Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f8fb;
            --card: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --radius: 12px;
            --max-width: 760px;
        }

        * {
            box-sizing: border-box
        }

        body {
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            margin: 0;
            padding: 40px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body.dark {
            background: radial-gradient(circle at top, #111827 0%, #0b1120 45%, #07101c 100%);
            color: #e2e8f0;
        }

        body.light {
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            color: #0f172a;
        }

        body.light input[type=number],
        body.light select,
        body.light .result,
        body.light h1,
        body.light p.lead,
        body.light label,
        body.light .site-header .brand,
        body.light .settings-toggle,
        body.light .color-picker-label {
            color: #0f172a;
        }

        body.light input[type=number],
        body.light select {
            background: #ffffff;
            border-color: rgba(15, 23, 42, 0.15);
        }

        body.light .result {
            background: rgba(15, 23, 42, 0.04);
            border-color: rgba(15, 23, 42, 0.12);
        }

        .ambient-lights {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.dark .ambient-lights {
            opacity: 1;
        }

        .ambient-lights span {
            position: absolute;
            border-radius: 50%;
            filter: blur(500px);
            opacity: 1;
            mix-blend-mode: screen;
            will-change: opacity, transform;
            box-shadow: 0 0 200px 100px var(--rgb-color), inset 0 0 100px 40px var(--rgb-color);
        }

        .ambient-lights .glow-1 {
            width: 350px;
            height: 350px;
            background: var(--rgb);
            top: 2%;
            left: 6%;
        }

        .ambient-lights .glow-2 {
            width: 350px;
            height: 350px;
            background: var(--rgb);
            bottom: 8%;
            right: 6%;
        }

        .ambient-lights .glow-3 {
            width: 350px;
            height: 350px;
            background: var(--rgb);
            top: 26%;
            right: 14%;
        }

        .card {
            width: 100%;
            max-width: var(--max-width);
            background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
            border-radius: var(--radius);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 30px 90px rgba(15, 23, 42, 0.35);
            padding: 32px;
            position: relative;
            z-index: 1;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        body.light .card {
            background: #ffffff;
            border-color: rgba(15, 23, 42, 0.08);
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.08);
        }

        .site-header {
            width: 100%;
            max-width: var(--max-width);
            margin-bottom: 20px;
            padding: 18px 24px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(51, 65, 85, 0.96));
            border-radius: calc(var(--radius) - 4px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.30);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            backdrop-filter: blur(12px);
        }

        body.light .site-header {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        }

        .site-header .brand {
            font-size: 18px;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        body.light .site-header .brand {
            color: #111827;
        }

        .site-header nav {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .settings-wrapper {
            display: flex;
            align-items: center;
            margin-left: auto;
            position: relative;
        }

        .settings-toggle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .settings-toggle:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.14);
        }

        .settings-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 12px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 220px;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(15, 23, 42, 0.94);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
            z-index: 2;
        }

        .settings-panel[hidden] {
            display: none;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.14);
        }

        body.light .theme-toggle {
            background: rgba(15, 23, 42, 0.06);
            color: #111827;
            border-color: rgba(15, 23, 42, 0.15);
        }

        .color-picker-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(248, 250, 252, 0.88);
            font-weight: 700;
            font-size: 13px;
        }

        .color-picker-label input {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 999px;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        .settings-panel input[type=range] {
            width: 100%;
            accent-color: #ff0000;
        }

        body.light .settings-panel {
            background: rgba(255, 255, 255, 0.98);
            border-color: rgba(15, 23, 42, 0.12);
        }

        body.light .settings-toggle {
            background: rgba(15, 23, 42, 0.06);
            color: #111827;
            border-color: rgba(15, 23, 42, 0.15);
        }

        body.light .color-picker-label {
            color: #0f172a;
        }

        .site-header nav a {
            color: rgba(248, 250, 252, 0.88);
            text-decoration: none;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
        }

        body.light .site-header nav a {
            color: #475569;
            background: rgba(15, 23, 42, 0.04);
        }

        .site-header nav a.active,
        .site-header nav a:hover {
            color: #f8fafc;
            background: rgba(96, 165, 250, 0.18);
            transform: translateY(-2px);
        }

        body.light .site-header nav a.active,
        body.light .site-header nav a:hover {
            color: #0f172a;
            background: rgba(56, 189, 248, 0.16);
        }

        .theme-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.14);
        }

        body.light .theme-toggle {
            background: rgba(15, 23, 42, 0.06);
            color: #111827;
            border-color: rgba(15, 23, 42, 0.15);
        }

        .color-picker-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(248, 250, 252, 0.88);
            font-weight: 700;
            font-size: 13px;
        }

        body.light .color-picker-label {
            display: none;
        }

        .color-picker-label input {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 999px;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px
        }

        h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 800;
            color: #f8fafc;
        }

        p.lead {
            color: #cbd5e1;
            margin: 8px 0 20px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .full {
            grid-column: 1/3
        }

        label {
            display: block;
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }

        input[type=number],
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            outline: none;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.25);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type=number]:focus,
        select:focus {
            border-color: rgba(96, 165, 250, 0.7);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
        }

        .radios {
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .radios label {
            margin: 0;
            color: #cbd5e1;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            border: 0;
            padding: 14px 20px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.01em;
            box-shadow: 0 18px 35px rgba(56, 189, 248, 0.24);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 22px 40px rgba(56, 189, 248, 0.32);
        }

        .result {
            margin-top: 16px;
            padding: 16px;
            border-radius: 14px;
            background: rgba(148, 163, 184, 0.14);
            color: #f8fafc;
            font-weight: 600;
            border: 1px solid rgba(148, 163, 184, 0.22);
        }

        footer {
            margin-top: 16px;
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width:600px) {
            body {
                padding: 18px
            }

            form {
                grid-template-columns: 1fr
            }

            .full {
                grid-column: 1
            }
        }
    </style>
</head>

<body class="dark">
    <div class="ambient-lights">
        <span class="glow glow-1"></span>
        <span class="glow glow-2"></span>
        <span class="glow glow-3"></span>
    </div>
    <div class="card">
        <header class="site-header">
            <div class="brand">Fitness Calculators</div>
            <nav>
                <a href="" class="active">Calories</a>
                <a href="index.html">Protein</a>
            </nav>
            <div class="settings-wrapper">
                <button id="settingsToggle" class="settings-toggle" type="button" aria-expanded="false" aria-controls="settingsPanel" title="Settings">⚙️</button>
                <div id="settingsPanel" class="settings-panel" hidden>
                    <button id="themeToggle" class="theme-toggle" type="button">Switch to Light</button>
                    <label class="color-picker-label">RGB
                        <input id="rgbColor" type="color" value="#ff0000">
                    </label>
                    <label class="color-picker-label">Glow
                        <input id="rgbIntensity" type="range" min="20" max="200" value="120">
                    </label>
                </div>
            </div>
        </header>

        <header>
            <div>
                <h1>Calorie Calculator</h1>
                <p class="lead">Estimate daily calorie needs based on weight and activity.</p>
            </div>
        </header>

        <form id="calculator">
            <div>
                <label for="age">Age</label>
                <input type="number" id="age" min="0" step="1" placeholder="Years">
            </div>

            <div>
                <label>Gender</label>
                <div class="radios">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>
            </div>

            <div>
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" min="0" step="0.1" placeholder="e.g. 70">
            </div>

            <div>
                <label for="height">Height (cm)</label>
                <input type="number" id="height" min="0" step="0.1" placeholder="e.g. 175">
            </div>

            <div class="full">
                <label for="activity">Activity level</label>
                <select id="activity">
                    <option id="sedentary" value="sedentary">Sedentary (little or no exercise)</option>
                    <option id="light" value="light">Lightly active (1-3 days/week)</option>
                    <option id="moderate" value="moderate">Moderately active (3-5 days/week)</option>
                    <option id="active" value="active">Active (6-7 days/week)</option>
                    <option id="veryActive" value="veryActive">Very active (heavy training / physical job)</option>
                </select>
            </div>

            <div class="full"
                style="display:flex;gap:12px;align-items:center;justify-content:flex-start;margin-top:6px">
                <button type="button" id="calculate">Calculate</button>
                <div id="result" class="result" aria-live="polite">Enter values and press Calculate.</div>
            </div>
        </form>

        <footer>Results are estimates. Consult a professional for personalized advice.</footer>
    </div>

    <script>
        const weightInput = document.getElementById('weight');
        const activitySelect = document.getElementById('activity');
        const calculateButton = document.getElementById('calculate');
        const resultBox = document.getElementById('result');
        const themeToggle = document.getElementById('themeToggle');
        const rgbColorInput = document.getElementById('rgbColor');
        const rgbIntensityInput = document.getElementById('rgbIntensity');
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');
        const root = document.documentElement;

        function hexToRgb(hex) {
            const normalized = hex.replace('#', '');
            const value = normalized.length === 3 ? normalized.split('').map(c => c + c).join('') : normalized;
            return {
                r: parseInt(value.slice(0, 2), 16),
                g: parseInt(value.slice(2, 4), 16),
                b: parseInt(value.slice(4, 6), 16)
            };
        }

        function setRgb(value, intensity = 120) {
            const { r, g, b } = hexToRgb(value);
            const alpha = Math.max(0.15, Math.min(intensity / 200, 1));
            const rgba = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            root.style.setProperty('--rgb', `radial-gradient(circle, ${rgba} 0%, ${rgba} 25%, rgba(255,255,255,0.40) 45%, transparent 85%)`);
            root.style.setProperty('--rgb-color', rgba);
        }

        function setRgbColor(value) {
            localStorage.setItem('rgbColor', value);
            setRgb(value, parseInt(rgbIntensityInput.value, 10));
        }

        function setRgbIntensity(intensity) {
            rgbIntensityInput.value = intensity;
            localStorage.setItem('rgbIntensity', intensity);
            setRgb(rgbColorInput.value, parseInt(intensity, 10));
        }

        function toggleSettings() {
            const isOpen = settingsPanel.hasAttribute('hidden');
            if (isOpen) {
                settingsPanel.removeAttribute('hidden');
                settingsToggle.setAttribute('aria-expanded', 'true');
            } else {
                settingsPanel.setAttribute('hidden', '');
                settingsToggle.setAttribute('aria-expanded', 'false');
            }
        }

        function setTheme(mode) {
            document.body.classList.toggle('dark', mode === 'dark');
            document.body.classList.toggle('light', mode === 'light');
            themeToggle.textContent = mode === 'dark' ? 'Switch to Light' : 'Switch to Dark';
            localStorage.setItem('theme', mode);
        }

        function toggleTheme() {
            const nextTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
            setTheme(nextTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);
        rgbColorInput.addEventListener('input', (event) => setRgbColor(event.target.value));
        rgbIntensityInput.addEventListener('input', (event) => setRgbIntensity(event.target.value));
        settingsToggle.addEventListener('click', toggleSettings);

        document.addEventListener('click', (event) => {
            if (!settingsPanel.contains(event.target) && !settingsToggle.contains(event.target)) {
                settingsPanel.setAttribute('hidden', '');
                settingsToggle.setAttribute('aria-expanded', 'false');
            }
        });

        const savedTheme = localStorage.getItem('theme') || 'dark';
        const savedColor = localStorage.getItem('rgbColor') || '#ff0000';
        const savedIntensity = localStorage.getItem('rgbIntensity') || '120';
        rgbColorInput.value = savedColor;
        rgbIntensityInput.value = savedIntensity;
        setRgb(savedColor, parseInt(savedIntensity, 10));
        setTheme(savedTheme);

        function computeCalories(weight, height, age, gender, activity) {
            let bmr;
            if (gender === 'male') {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }

            switch (activity) {
                case 'sedentary':
                    return bmr * 1.2;
                case 'light':
                    return bmr * 1.375;
                case 'moderate':
                    return bmr * 1.55;
                case 'active':
                    return bmr * 1.725;
                case 'veryActive':
                    return bmr * 1.9;
                default:
                    return bmr;
            }
        }

        calculateButton.addEventListener('click', () => {
            const weight = parseFloat(weightInput.value);
            const height = parseFloat(document.getElementById('height').value);
            const age = parseFloat(document.getElementById('age').value);
            const genderInput = document.querySelector('input[name="gender"]:checked');
            const gender = genderInput ? genderInput.value : null;
            const activity = activitySelect.value;

            if (!age || age <= 0 || isNaN(age)) {
                resultBox.textContent = 'Please enter a valid age.';
                return;
            }

            if (!gender) {
                resultBox.textContent = 'Please select your gender.';
                return;
            }

            if (!weight || weight <= 0 || isNaN(weight)) {
                resultBox.textContent = 'Please enter a valid weight in kilograms.';
                return;
            }

            if (!height || height <= 0 || isNaN(height)) {
                resultBox.textContent = 'Please enter a valid height in centimeters.';
                return;
            }

            const calories = computeCalories(weight, height, age, gender, activity);
            resultBox.textContent = `Estimated daily calorie needs: ${calories.toFixed(0)} kcal`;
        });
    </script>
</body>

</html>
